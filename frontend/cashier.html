<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SagraQRCode Cashier System" />
    <title>Cashier - SagraQRCode</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>

  <body style="background: var(--gray-900); color: white;">
    <!-- Header -->
    <header class="header" style="background: var(--gray-800); border-color: var(--gray-700);">
      <div class="container">
        <div class="header-content">
          <h1 class="header-title">💳 Cashier System</h1>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <div id="status-indicator" class="status-indicator online"></div>
            <div style="text-align: right;">
              <div id="status-text" style="font-size: 0.875rem; color: var(--gray-400);">Online</div>
              <div id="scan-count" style="font-size: 0.75rem; color: var(--gray-500);">
                Scans: 0
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="padding: 2rem 0;">
      <!-- Alerts -->
      <div id="alerts-container" style="margin-bottom: 2rem;"></div>

      <!-- Scan Input -->
      <div class="card" style="background: var(--gray-800); border-color: var(--gray-700); margin-bottom: 2rem;">
        <div style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; color: var(--gray-300);">
            🔍 USB 2D Scanner Input (Auto-focus)
          </label>
          <input
            type="text"
            id="qr-input"
            placeholder="Scan QR code here..."
            style="
              width: 100%;
              background: var(--gray-700);
              color: white;
              border-color: var(--gray-600);
              font-size: 1.25rem;
              padding: 1rem;
            "
            autocomplete="off"
            autofocus
          />
        </div>
      </div>

      <!-- Order Processing Grid -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        <!-- Pending Order -->
        <div>
          <div class="card" style="background: var(--gray-800); border-color: var(--gray-700);">
            <h2 class="card-title" style="color: white; margin-bottom: 1rem;">📦 Current Order</h2>
            <div
              id="current-order"
              style="
                min-height: 200px;
                background: var(--gray-700);
                border-radius: 8px;
                padding: 1rem;
                color: var(--gray-300);
              "
            >
              <p style="text-align: center; margin-top: 3rem;">Waiting for scan...</p>
            </div>
          </div>
        </div>

        <!-- Payment Confirmation -->
        <div>
          <div class="card" style="background: var(--gray-800); border-color: var(--gray-700);">
            <h2 class="card-title" style="color: white; margin-bottom: 1rem;">💰 Payment</h2>
            <div id="payment-panel" style="min-height: 200px; display: flex; flex-direction: column; gap: 1rem;">
              <p style="text-align: center; color: var(--gray-400);">No order loaded</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats Footer -->
      <div style="margin-top: 2rem; text-align: center; color: var(--gray-500); font-size: 0.875rem;">
        <p>Last scan: <span id="last-scan-time">-</span></p>
      </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="/js/cashier.js"></script>
  </body>
</html>
