<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SagraQRCode Admin Dashboard" />
    <title>Admin Dashboard - SagraQRCode</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>

  <body>
    <!-- Header -->
    <header class="header">
      <div class="container">
        <div class="header-content">
          <h1 class="header-title">🔐 Admin Dashboard</h1>
          <button class="btn btn-danger btn-small" id="logout-btn">Logout</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="padding: 2rem 0;">
      <div id="auth-form" style="display: none;">
        <div class="card" style="max-width: 400px; margin: 2rem auto;">
          <h2 class="card-title" style="margin-bottom: 1.5rem;">Enter Admin Password</h2>
          <div style="margin-bottom: 1rem;">
            <input
              type="password"
              id="admin-password"
              placeholder="Admin password"
              style="width: 100%;"
              autocomplete="off"
            />
          </div>
          <button class="btn btn-primary" style="width: 100%;" id="submit-password-btn">
            Submit
          </button>
        </div>
      </div>

      <div id="dashboard-content" style="display: none;">
        <!-- Alerts -->
        <div id="alerts-container" style="margin-bottom: 2rem;"></div>

        <!-- Menu Management Section -->
        <div class="card" style="margin-bottom: 2rem;">
          <div class="card-header">
            <h2 class="card-title">📋 Menu Management</h2>
            <div style="display: flex; gap: 1rem;">
              <button class="btn btn-success btn-small" id="refresh-menu-btn">Refresh</button>
              <button class="btn btn-primary btn-small" id="export-menu-btn">Export</button>
            </div>
          </div>

          <div id="menu-list" style="max-height: 600px; overflow-y: auto;">
            <p style="text-align: center; color: var(--gray-500);">Loading menu...</p>
          </div>

          <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--gray-200);">
            <button class="btn btn-primary" style="width: 100%;" id="save-menu-btn">
              Save Changes
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Admin Dashboard • v1.0</p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="/js/admin-panel.js"></script>
  </body>
</html>
